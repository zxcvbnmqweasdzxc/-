<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开发者后台 · 卡密系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #0b0f17;
            min-height: 100vh;
            padding: 20px;
            color: #eef3fc;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app { max-width: 1100px; width: 100%; }
        
        .card {
            background: #131b26;
            border-radius: 20px;
            padding: 24px 22px;
            border: 1px solid #26303e;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 18px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #c8daf0;
            border-left: 4px solid #3f85c0;
            padding-left: 14px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            background: #1f2b3c;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            color: #dfe9f5;
            cursor: pointer;
            border: 1px solid #314257;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: #2a6b9c; border-color: #3f88c7; color: white; }
        .btn-primary:hover { background: #327bb3; }
        .btn-success { background: #1f8b6b; border-color: #2bb08a; color: white; }
        .btn-success:hover { background: #28a07c; }
        .btn-danger { background: #9e3e4e; border-color: #c45568; color: white; }
        .btn-danger:hover { background: #b84a5c; }
        .btn-warning { background: #b8860b; border-color: #d4a017; color: white; }
        .btn-warning:hover { background: #d4a017; }
        .btn-outline { background: transparent; border-color: #3d4d62; }
        .btn-outline:hover { background: #1f2a39; }
        .btn-sm { padding: 4px 14px; font-size: 12px; }
        
        input {
            background: #0d1622;
            border: 1px solid #263340;
            border-radius: 40px;
            padding: 10px 18px;
            color: #e3edf9;
            font-size: 14px;
            outline: none;
            width: 100%;
            transition: 0.15s;
        }
        input:focus { border-color: #3f85c0; box-shadow: 0 0 0 3px rgba(63,133,192,0.2); }
        input::placeholder { color: #5b718b; }
        
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; align-items: center; gap: 10px; }
        .gap-2 { gap: 12px; }
        .mt-3 { margin-top: 20px; }
        .mb-2 { margin-bottom: 12px; }
        .text-muted { color: #869dbd; font-size: 14px; }
        .text-small { font-size: 13px; }
        
        .page { display: none; animation: fade 0.2s; }
        .page.active { display: block; }
        @keyframes fade { 0%{ opacity:0.5; transform: translateY(6px); } 100%{ opacity:1; transform: translateY(0); } }
        
        .table-wrap { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 8px; color: #92abcb; border-bottom: 1px solid #223140; font-weight: 500; }
        td { padding: 10px 8px; border-bottom: 1px solid #1d2a38; vertical-align: middle; }
        .badge { background: #1f334a; padding: 2px 12px; border-radius: 40px; font-size: 12px; color: #b8d0ec; }
        
        .auth-box { max-width: 400px; margin: 40px auto; }
        .auth-box h2 { text-align: center; margin-bottom: 16px; }
        
        .back-btn {
            background: transparent;
            border: none;
            color: #7fc9f0;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover { color: #a8d8f0; }
        
        .tag {
            background: #1f334a;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            color: #b8d0ec;
        }
        
        .empty { text-align: center; color: #5b718b; padding: 30px 0; font-size: 14px; }
        
        .action-cell {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .action-cell .btn-sm { padding: 2px 12px; font-size: 11px; }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .data-source {
            background: #0d1824;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #7fc9f0;
            border: 1px solid #1f334a;
        }
        
        @media (max-width: 600px) {
            .action-cell { flex-direction: column; }
            .top-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <!-- ============================================================ -->
    <!-- 登录页 -->
    <!-- ============================================================ -->
    <div id="page-login" class="page active">
        <div class="card auth-box">
            <h2>🔐 开发者后台</h2>
            <div style="text-align:center; margin-bottom:12px; color:#7b93b5; font-size:13px;">检测所有后台账号数据</div>
            <input type="password" id="loginPass" placeholder="开发者密码" style="margin-bottom:12px;">
            <button class="btn btn-primary btn-block" id="loginBtn" style="width:100%;justify-content:center;">登录</button>
            <div id="loginMsg" style="margin-top:12px; color:#f56c6c; text-align:center; font-size:14px;"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 主面板 - 检测到的所有账号 -->
    <!-- ============================================================ -->
    <div id="page-main" class="page">
        <div class="card">
            <div class="card-title">
                <span>📋 检测到的所有账号</span>
                <div class="flex-center">
                    <span class="data-source" id="dataSource">📌 数据源: localStorage</span>
                    <span class="tag" id="totalAccounts">共 0 个账号</span>
                    <button class="btn btn-success btn-sm" id="refreshMainBtn">🔄 刷新检测</button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>账号</th>
                            <th>密码</th>
                            <th>卡密数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="accountTableBody">
                        <tr><td colspan="4" class="empty">暂未检测到账号数据</td></tr>
                    </tbody>
                </table>
            </div>
            <div style="margin-top:12px; font-size:12px; color:#5b718b;">
                💡 检测的是 localStorage 中 key 为 <code>admin_accounts_data_v2</code> 的数据
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 编辑账号页 -->
    <!-- ============================================================ -->
    <div id="page-edit" class="page">
        <div class="card">
            <div class="card-title">
                <span>✏️ 编辑账号</span>
                <button class="back-btn" id="editBackBtn">← 返回</button>
            </div>
            <div style="max-width:400px;margin:0 auto;">
                <div class="mb-2">
                    <label style="color:#869dbd;font-size:13px;">账号</label>
                    <input type="text" id="editUsername" placeholder="新账号" style="margin-top:4px;">
                </div>
                <div class="mb-2">
                    <label style="color:#869dbd;font-size:13px;">密码</label>
                    <input type="text" id="editPassword" placeholder="新密码" style="margin-top:4px;">
                </div>
                <button class="btn btn-success btn-block" id="editSaveBtn" style="width:100%;justify-content:center;">💾 保存修改</button>
                <div id="editMsg" style="margin-top:12px; color:#5fda9e; text-align:center; font-size:14px;"></div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 查看卡密页 -->
    <!-- ============================================================ -->
    <div id="page-view" class="page">
        <div class="card">
            <div class="card-title">
                <span>📋 卡密列表 · <span id="viewAccountName">(账号)</span></span>
                <button class="back-btn" id="viewBackBtn">← 返回</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>卡密</th>
                            <th>到期时间</th>
                            <th>绑定设备</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="viewCardTableBody">
                        <tr><td colspan="5" class="empty">该账号暂无卡密</td></tr>
                    </tbody>
                </table>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-success btn-sm" id="viewAddCardBtn">➕ 生成卡密</button>
                <span id="viewMsg" style="margin-left:12px;color:#5fda9e;font-size:13px;"></span>
            </div>
        </div>
    </div>

</div>

<script>
    // ================================================================
    // ★★★★★ 开发者密码 ★★★★★
    // ================================================================
    var DEVELOPER_PASSWORD = 'dev123';  // 开发者密码，可修改

    // ================================================================
    // ★★★★★ 读取普通后台的数据 (关键) ★★★★★
    // ================================================================
    var STORAGE_KEY = 'admin_accounts_data_v2';      // 账号数据key
    var CARDS_PREFIX = 'admin_cards_';               // 卡密数据前缀

    function loadAllAccounts() {
        var data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            try { return JSON.parse(data); } catch(e) {}
        }
        return {};
    }

    function saveAllAccounts(accounts) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
    }

    function loadAccountCards(account) {
        var data = localStorage.getItem(CARDS_PREFIX + account);
        if (data) {
            try { return JSON.parse(data); } catch(e) {}
        }
        return [];
    }

    function saveAccountCards(account, cards) {
        localStorage.setItem(CARDS_PREFIX + account, JSON.stringify(cards));
    }

    // ================================================================
    // ★★★★★ 工具函数 ★★★★★
    // ================================================================
    function generateCardKey() {
        var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        var key = '';
        for (var i = 0; i < 16; i++) {
            key += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return key;
    }

    function getBeijingTime() {
        var now = new Date();
        var offset = 8 * 60 + now.getTimezoneOffset();
        var beijing = new Date(now.getTime() + offset * 60000);
        var y = beijing.getFullYear();
        var m = String(beijing.getMonth()+1).padStart(2,'0');
        var d = String(beijing.getDate()).padStart(2,'0');
        var h = String(beijing.getHours()).padStart(2,'0');
        var min = String(beijing.getMinutes()).padStart(2,'0');
        var s = String(beijing.getSeconds()).padStart(2,'0');
        return y + '-' + m + '-' + d + ' ' + h + ':' + min + ':' + s;
    }

    // ================================================================
    // ★★★★★ 页面切换 ★★★★★
    // ================================================================
    var currentEditAccount = null;
    var currentViewAccount = null;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(function(p) {
            p.classList.remove('active');
        });
        document.getElementById(pageId).classList.add('active');
    }

    // ================================================================
    // ★★★★★ 登录 ★★★★★
    // ================================================================
    document.getElementById('loginBtn').addEventListener('click', function() {
        var pass = document.getElementById('loginPass').value.trim();
        if (pass === DEVELOPER_PASSWORD) {
            document.getElementById('loginMsg').innerText = '';
            showPage('page-main');
            renderMainTable();
        } else {
            document.getElementById('loginMsg').innerText = '❌ 密码错误';
        }
    });

    document.getElementById('loginPass').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginBtn').click();
        }
    });

    // ================================================================
    // ★★★★★ 主表格 (检测所有账号) ★★★★★
    // ================================================================
    function renderMainTable() {
        var accounts = loadAllAccounts();
        var tbody = document.getElementById('accountTableBody');
        var keys = Object.keys(accounts);
        document.getElementById('totalAccounts').innerText = '共 ' + keys.length + ' 个账号';

        if (keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty">暂未检测到账号数据</td></tr>';
            return;
        }

        var html = '';
        for (var i = 0; i < keys.length; i++) {
            var acc = keys[i];
            var cards = loadAccountCards(acc);
            var cardCount = cards.length;
            html += '<tr>';
            html += '<td><strong>' + acc + '</strong></td>';
            html += '<td><span style="font-family:monospace;color:#7fc9f0;">' + accounts[acc] + '</span></td>';
            html += '<td><span class="badge">' + cardCount + ' 张</span></td>';
            html += '<td>';
            html += '<div class="action-cell">';
            html += '<button class="btn btn-warning btn-sm" onclick="openEdit(\'' + acc + '\')">✏️ 编辑</button>';
            html += '<button class="btn btn-primary btn-sm" onclick="openView(\'' + acc + '\')">👁️ 查看</button>';
            html += '<button class="btn btn-danger btn-sm" onclick="deleteAccount(\'' + acc + '\')">🗑️ 删除</button>';
            html += '</div>';
            html += '</td>';
            html += '</tr>';
        }
        tbody.innerHTML = html;
    }

    document.getElementById('refreshMainBtn').addEventListener('click', function() {
        renderMainTable();
        this.textContent = '✅ 已刷新';
        var self = this;
        setTimeout(function() { self.textContent = '🔄 刷新检测'; }, 1200);
    });

    // ================================================================
    // ★★★★★ 编辑账号 ★★★★★
    // ================================================================
    window.openEdit = function(account) {
        currentEditAccount = account;
        var accounts = loadAllAccounts();
        document.getElementById('editUsername').value = account;
        document.getElementById('editPassword').value = accounts[account] || '';
        document.getElementById('editMsg').innerText = '';
        showPage('page-edit');
    };

    document.getElementById('editBackBtn').addEventListener('click', function() {
        showPage('page-main');
        renderMainTable();
    });

    document.getElementById('editSaveBtn').addEventListener('click', function() {
        if (!currentEditAccount) return;
        var newName = document.getElementById('editUsername').value.trim();
        var newPass = document.getElementById('editPassword').value.trim();
        if (!newName || !newPass) {
            document.getElementById('editMsg').innerText = '⚠️ 账号和密码不能为空';
            document.getElementById('editMsg').style.color = '#f56c6c';
            return;
        }
        var accounts = loadAllAccounts();
        var oldName = currentEditAccount;
        
        if (newName !== oldName) {
            if (accounts[newName]) {
                document.getElementById('editMsg').innerText = '❌ 用户名已存在';
                document.getElementById('editMsg').style.color = '#f56c6c';
                return;
            }
            var cards = loadAccountCards(oldName);
            accounts[newName] = newPass;
            delete accounts[oldName];
            saveAllAccounts(accounts);
            saveAccountCards(newName, cards);
            localStorage.removeItem(CARDS_PREFIX + oldName);
            currentEditAccount = newName;
        } else {
            accounts[oldName] = newPass;
            saveAllAccounts(accounts);
        }
        
        document.getElementById('editMsg').innerText = '✅ 修改成功！';
        document.getElementById('editMsg').style.color = '#5fda9e';
        setTimeout(function() {
            showPage('page-main');
            renderMainTable();
        }, 800);
    });

    // ================================================================
    // ★★★★★ 查看卡密 ★★★★★
    // ================================================================
    window.openView = function(account) {
        currentViewAccount = account;
        document.getElementById('viewAccountName').innerText = account;
        document.getElementById('viewMsg').innerText = '';
        renderViewCards(account);
        showPage('page-view');
    };

    function renderViewCards(account) {
        var cards = loadAccountCards(account);
        var tbody = document.getElementById('viewCardTableBody');
        if (cards.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">该账号暂无卡密</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < cards.length; i++) {
            var c = cards[i];
            var status = c.bound ? '🔒 已绑定' : '🔓 未绑定';
            var device = c.device || '—';
            html += '<tr>';
            html += '<td><span style="font-family:monospace;">' + c.key + '</span></td>';
            html += '<td>' + (c.expire || '永久') + '</td>';
            html += '<td>' + device + '</td>';
            html += '<td><span class="badge">' + status + '</span></td>';
            html += '<td>';
            html += '<button class="btn btn-danger btn-sm" onclick="deleteCard(\'' + account + '\', \'' + c.key + '\')">🗑️ 删除</button>';
            html += '</td>';
            html += '</tr>';
        }
        tbody.innerHTML = html;
    }

    document.getElementById('viewBackBtn').addEventListener('click', function() {
        showPage('page-main');
        renderMainTable();
    });

    // ================================================================
    // ★★★★★ 查看页生成卡密 ★★★★★
    // ================================================================
    document.getElementById('viewAddCardBtn').addEventListener('click', function() {
        if (!currentViewAccount) return;
        var cards = loadAccountCards(currentViewAccount);
        var newKey = generateCardKey();
        cards.push({
            key: newKey,
            expire: '永久',
            bound: false,
            device: '',
            createdAt: getBeijingTime()
        });
        saveAccountCards(currentViewAccount, cards);
        renderViewCards(currentViewAccount);
        document.getElementById('viewMsg').innerText = '✅ 已生成: ' + newKey;
        var self = this;
        setTimeout(function() {
            document.getElementById('viewMsg').innerText = '';
        }, 3000);
    });

    // ================================================================
    // ★★★★★ 删除卡密 ★★★★★
    // ================================================================
    window.deleteCard = function(account, key) {
        if (!confirm('确定要删除卡密「' + key + '」吗？')) return;
        var cards = loadAccountCards(account);
        var newCards = [];
        for (var i = 0; i < cards.length; i++) {
            if (cards[i].key !== key) {
                newCards.push(cards[i]);
            }
        }
        saveAccountCards(account, newCards);
        renderViewCards(account);
        document.getElementById('viewMsg').innerText = '✅ 已删除卡密';
        setTimeout(function() {
            document.getElementById('viewMsg').innerText = '';
        }, 2000);
    };

    // ================================================================
    // ★★★★★ 删除账号 ★★★★★
    // ================================================================
    window.deleteAccount = function(account) {
        if (!confirm('⚠️ 确定要删除账号「' + account + '」及其所有卡密吗？\n此操作不可恢复！')) return;
        var accounts = loadAllAccounts();
        delete accounts[account];
        saveAllAccounts(accounts);
        localStorage.removeItem(CARDS_PREFIX + account);
        renderMainTable();
        alert('✅ 账号「' + account + '」已删除');
    };

    // ================================================================
    // ★★★★★ 初始化 ★★★★★
    // ================================================================
    showPage('page-login');
    console.log('✅ 开发者后台已启动');
    console.log('📌 检测 Key: ' + STORAGE_KEY);
    console.log('📌 检测前缀: ' + CARDS_PREFIX);
    console.log('📌 默认密码: dev123');
</script>

</body>
</html>
